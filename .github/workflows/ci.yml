name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Connector unit tests
        run: python -m pytest tests/connectors -q -m "not live"

      - name: Schema validation tests
        run: python -m pytest tests/schemas -q

      - name: Pipeline tests
        run: python -m pytest tests/pipeline -q

      - name: Eval tests
        run: python -m pytest tests/evals -q

      - name: Synthesis tests
        run: python -m pytest tests/synthesis -q

      - name: Fixture and integration tests
        run: python -m pytest tests/fixtures -q

      - name: Fixture pipeline generation (STING/PDAC)
        run: |
          python -m pipeline.run_workflow \
            --config configs/cases/sting_pdac.yaml \
            --mode fixture

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm install

      - name: Frontend build
        run: npm run build --workspace=web
