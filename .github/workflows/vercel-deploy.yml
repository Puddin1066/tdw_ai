# Vercel Git integration skips npm/next build for this npm-workspace monorepo (~100ms "Ready"
# deploys). This workflow builds explicitly and deploys prebuilt output to tdw_ai production.
name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_YZo7N9A9nmHkDimf50f2dwzz
      VERCEL_PROJECT_ID: prj_HK5iMTcvRdecXxu977gGdEPrBvPF
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install monorepo dependencies
        run: npm ci

      - name: Build Next.js (web workspace)
        run: npm run build --workspace=web
        env:
          VERCEL: "1"

      - name: Install Vercel CLI
        run: npm install -g vercel@54.7.1

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web

      - name: Build Vercel output
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web
