# Deploy to the `web` Vercel project (real Next builds). Git integration on `tdw_ai` only
# produces ~100ms empty deploys for this npm-workspace monorepo.
name: Deploy to Vercel (web project)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_YZo7N9A9nmHkDimf50f2dwzz
      VERCEL_PROJECT_ID: prj_a5zIEmXcMBLhQlanNM22FudwS237
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install monorepo dependencies
        run: npm ci

      - name: Build Next.js (web workspace)
        run: npm run build --workspace=web
        env:
          VERCEL: "1"

      - name: Install Vercel CLI
        run: npm install -g vercel@54.7.1

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel output
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
